<html>

    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <style>

            @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap');

            body {
                padding: 32px;
                margin: 0;
                font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
                font-size: 16px;
                line-height: 1.6;
                background: #0a0a0f;
                color: #e0e0e0;
                -webkit-font-smoothing: antialiased;
                -moz-osx-font-smoothing: grayscale;
            }

            .burger-menu {
                display: none;
            }

            .mobile-nav {
                display: none;
            }

            .outer-container {
                max-width: 800px;
                margin: 0 auto;
                padding: 32px;
                color: #e0e0e0;
                border: 1px solid #252535;
                border-radius: 8px;
                background: #151520;
            }

            pre {
                font-family: 'JetBrains Mono', Consolas, Monaco, monospace;
                font-size: 14px;
                padding: 24px;
                overflow-x: auto;
                background: #111118;
                border: 1px solid #252535;
                border-radius: 8px;
            }

            code {
                font-family: 'JetBrains Mono', Consolas, Monaco, monospace;
                font-size: 14px;
            }

            :not(pre) > code {
                background: #111118;
                padding: 2px 6px;
                border-radius: 4px;
                color: #1deac5;
            }

            h1, h2 {
                margin-top: 32px;
            }

            h1, h2, h3, h4, h5, h6 {
                border-bottom: 1px solid #252535;
                color: #ffffff;
            }

            a {
                text-decoration: none;
                color: #1deac5;
            }

            a:hover {
                color: #12b89a;
            }

            table {
                width: 100%;
                border-collapse: collapse;
                margin: 16px 0;
            }

            th, td {
                padding: 10px 14px;
                border: 1px solid #252535;
                text-align: left;
            }

            th {
                background: #111118;
                color: #1deac5;
                font-weight: 600;
            }

            tr:nth-child(even) {
                background: rgba(17, 17, 24, 0.5);
            }

            tr:hover {
                background: rgba(29, 234, 197, 0.05);
            }

            blockquote {
                border-left: 3px solid #1deac5;
                padding-left: 16px;
                margin-left: 0;
                color: #a0a0b0;
            }

            hr {
                border: none;
                border-top: 1px solid #252535;
                margin: 24px 0;
            }

            /* Tab styles */
            .tabs {
                display: flex;
                gap: 4px;
                margin-bottom: 24px;
                padding: 0 16px;
                position: relative;
                background: #111118;
                border-bottom: 1px solid #252535;
                border-radius: 8px 8px 0 0;
                overflow-x: auto;
            }
            .tab {
                padding: 12px 20px;
                cursor: pointer;
                border: none;
                background: none;
                font-family: 'Inter', sans-serif;
                font-size: 14px;
                font-weight: 500;
                position: relative;
                color: #a0a0b0;
                transition: all 0.2s ease;
                white-space: nowrap;
            }
            .tab.active {
                font-weight: 600;
                color: #1deac5;
            }
            .tabs::after {
                content: '';
                position: absolute;
                bottom: -1px;
                height: 2px;
                background: #1deac5;
                transition: all 0.3s ease;
                width: var(--tab-width, 0);
                transform: translateX(var(--tab-left, 0));
                left: 0;
            }
            .tab:hover {
                background: rgba(29, 234, 197, 0.1);
                color: #e0e0e0;
            }
            .content {
                display: none;
            }
            .content.active {
                display: block;
            }
            .content .container {
                border-top-left-radius: 0;
                border-top-right-radius: 0;
            }
            .current-section {
                display: none;
            }

            /* Mobile styles */
            @media (max-width: 768px) {
                body {
                    padding: 0;
                }

                h1 {
                    margin: 0px !important;
                }

                .current-section {
                    display: block;
                }

                .outer-container {
                    padding: 16px !important;
                    border: none !important;
                    border-radius: 0 !important;
                    margin-top: 56px !important;
                }

                .mobile-header {
                    display: flex !important;
                    position: fixed;
                    top: 0;
                    left: 0;
                    right: 0;
                    height: 56px;
                    background: #111118;
                    border-bottom: 1px solid #252535;
                    z-index: 999;
                    align-items: center;
                    padding: 0 16px;
                }

                .mobile-header .current-section {
                    margin-left: 48px;
                    font-weight: 500;
                    font-size: 16px;
                    flex-grow: 1;
                    white-space: nowrap;
                    overflow: hidden;
                    text-overflow: ellipsis;
                    color: #e0e0e0;
                }

                .burger-menu {
                    position: relative;
                    top: 0;
                    left: 0;
                    margin-right: 8px;
                    margin-top: -6px;
                }

                .mobile-nav .tab {
                    display: flex;
                    align-items: center;
                    justify-content: space-between;
                    width: 100%;
                    text-align: left;
                    padding: 16px;
                    border-bottom: 1px solid #252535;
                    color: #a0a0b0;
                }

                .mobile-nav .tab.active {
                    background: rgba(29, 234, 197, 0.1);
                    font-weight: 500;
                    color: #1deac5;
                }

                .mobile-nav .tab.active::after {
                    content: '\2713';
                    margin-left: 8px;
                    color: #1deac5;
                }

                .burger-menu {
                    display: block !important;
                    position: fixed;
                    top: 16px;
                    left: 16px;
                    z-index: 1000;
                    background: none;
                    border: none;
                    padding: 8px;
                    cursor: pointer;
                }

                .burger-menu span {
                    display: block;
                    width: 24px;
                    height: 2px;
                    margin: 4px 0;
                    background: #e0e0e0;
                    transition: 0.3s;
                }

                .mobile-nav {
                    display: block !important;
                    position: fixed;
                    top: 0;
                    left: -250px;
                    width: 250px;
                    height: 100%;
                    background: #151520;
                    box-shadow: 2px 0 8px rgba(0, 0, 0, 0.5);
                    transition: 0.3s;
                    z-index: 999;
                    padding-top: 60px;
                }

                .mobile-nav.active {
                    left: 0;
                }

                .tabs {
                    display: none !important;
                }

                .overlay {
                    display: none;
                    position: fixed;
                    top: 0;
                    left: 0;
                    width: 100%;
                    height: 100%;
                    background: rgba(0, 0, 0, 0.6);
                    z-index: 998;
                }

                .overlay.active {
                    display: block;
                }
            }


        </style>
    </head>

    <body>
        <div class="mobile-header">
            <button class="burger-menu" id="burgerMenu">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <div class="current-section" id="currentSection"></div>
        </div>
        <div class="mobile-nav" id="mobileNav"></div>
        <div class="overlay" id="overlay"></div>
        <div class="outer-container">
            <div class="tabs" id="tabs"></div>
            
            <div class="content active" data-tab-title="Overview">
                    {overview_html}
            </div>

            <div class="content" data-tab-title="HTTP API">
                    {rest_html}
            </div>

            <div class="content" data-tab-title="Pagination">
                    {pagination_html}
            </div>

            <div class="content" data-tab-title="Field Reference">
                    {field_reference_html}
            </div>

            <div class="content" data-tab-title="Error Handling">
                    {error_handling_html}
            </div>

            <div class="content" data-tab-title="KRC-721 Specifications">
                    {krc721_html}
            </div>

            <div class="content" data-tab-title="Rust">
                    {rust_html}
            </div>

            <div class="content" data-tab-title="TypeScript">
                    {ts_html}
            </div>
        </div>

        <script>
            function initTabs() {
                const tabsContainer = document.getElementById('tabs');
                const mobileNav = document.getElementById('mobileNav');
                const burgerMenu = document.getElementById('burgerMenu');
                const overlay = document.getElementById('overlay');
                const contents = document.querySelectorAll('.content');
                
                function slugify(text) {
                    return text.toLowerCase()
                        .replace(/\s+/g, '-')
                        .replace(/[^\w\-]+/g, '')
                        .replace(/\-\-+/g, '-')
                        .replace(/^-+/, '')
                        .replace(/-+$/, '');
                }
                
                function toggleMobileMenu() {
                    mobileNav.classList.toggle('active');
                    overlay.classList.toggle('active');
                    
                    const spans = burgerMenu.querySelectorAll('span');
                    if (mobileNav.classList.contains('active')) {
                        spans[0].style.transform = 'rotate(45deg) translate(5px, 5px)';
                        spans[1].style.opacity = '0';
                        spans[2].style.transform = 'rotate(-45deg) translate(5px, -5px)';
                    } else {
                        spans[0].style.transform = 'none';
                        spans[1].style.opacity = '1';
                        spans[2].style.transform = 'none';
                    }
                }

                burgerMenu.addEventListener('click', toggleMobileMenu);
                overlay.addEventListener('click', toggleMobileMenu);

                contents.forEach(content => {
                    const title = content.dataset.tabTitle;
                    const slug = slugify(title);
                    content.dataset.tabSlug = slug;
                    
                    const tab = document.createElement('button');
                    tab.className = 'tab';
                    tab.textContent = title;
                    tab.dataset.tabTitle = title;
                    tab.dataset.tabSlug = slug;
                    tab.addEventListener('click', () => activateTab(slug));
                    tabsContainer.appendChild(tab);

                    const mobileTab = document.createElement('button');
                    mobileTab.className = 'tab';
                    mobileTab.textContent = title;
                    mobileTab.dataset.tabTitle = title;
                    mobileTab.dataset.tabSlug = slug;
                    mobileTab.addEventListener('click', () => {
                        activateTab(slug);
                        toggleMobileMenu();
                    });
                    mobileNav.appendChild(mobileTab);
                });

                function updateTabIndicator(activeTab) {
                    const tabsEl = document.querySelector('.tabs');
                    if (!activeTab || !tabsEl) return;
                    if (window.innerWidth > 768) {
                        const width = activeTab.offsetWidth;
                        const left = activeTab.offsetLeft;
                        tabsEl.style.setProperty('--tab-width', width + 'px');
                        tabsEl.style.setProperty('--tab-left', left + 'px');
                    }
                }

                window.addEventListener('resize', () => {
                    const activeTab = document.querySelector('.tabs .tab.active');
                    updateTabIndicator(activeTab);
                });

                function activateTab(slug) {
                    history.replaceState(null, null, '#' + slug);
                    document.querySelectorAll('.tab').forEach(tab => {
                        tab.classList.toggle('active', tab.dataset.tabSlug === slug);
                        if (tab.dataset.tabSlug === slug) {
                            document.getElementById('currentSection').textContent = tab.dataset.tabTitle;
                        }
                    });
                    const activeDesktopTab = document.querySelector('.tabs .tab.active');
                    updateTabIndicator(activeDesktopTab);
                    contents.forEach(content => {
                        content.classList.toggle('active', content.dataset.tabSlug === slug);
                    });
                }

                const style = document.createElement('style');
                style.textContent = `
                    .tabs::after {
                        width: var(--tab-width, 0);
                        transform: translateX(var(--tab-left, 0));
                    }
                `;
                document.head.appendChild(style);

                const hash = decodeURIComponent(window.location.hash.slice(1));
                if (hash) {
                    const tab = document.querySelector(`.tab[data-tab-slug="${hash}"]`);
                    if (tab) {
                        activateTab(hash);
                    } else {
                        const firstTab = document.querySelector('.tab');
                        activateTab(firstTab.dataset.tabSlug);
                    }
                } else {
                    const firstTab = document.querySelector('.tab');
                    activateTab(firstTab.dataset.tabSlug);
                }

                window.addEventListener('hashchange', () => {
                    const newHash = decodeURIComponent(window.location.hash.slice(1));
                    const tab = document.querySelector(`.tab[data-tab-slug="${newHash}"]`);
                    if (tab) {
                        activateTab(newHash);
                    }
                });

                const activeDesktopTab = document.querySelector('.tabs .tab.active');
                updateTabIndicator(activeDesktopTab);
            }

            document.addEventListener('DOMContentLoaded', initTabs);
        </script>
    </body>

</html>
