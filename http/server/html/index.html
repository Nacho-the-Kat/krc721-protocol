<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="KRC-721 NFT Indexer for Kaspa - Real-time indexing and API for Kaspa NFT protocol">
    <title>KRC-721 Indexer - Kaspa NFT Protocol</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap');

        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #111118;
            --bg-card: #151520;
            --bg-card-hover: #1a1a28;
            --border-color: #252535;
            --text-primary: #ffffff;
            --text-secondary: #a0a0b0;
            --text-tertiary: #6b6b7f;
            --accent-primary: #1deac5;
            --accent-secondary: #12b89a;
            --accent-glow: rgba(29, 234, 197, 0.15);
            --success: #10b981;
            --warning: #f59e0b;
            --error: #ef4444;
            --gradient-primary: linear-gradient(135deg, #1deac5 0%, #12b89a 100%);
            --gradient-bg: linear-gradient(180deg, #0a0a0f 0%, #111118 100%);
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.3);
            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.4);
            --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.5);
            --shadow-glow: 0 0 24px rgba(29, 234, 197, 0.2);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            font-size: 15px;
            line-height: 1.6;
            background: var(--bg-primary);
            background-image: 
                radial-gradient(circle at 20% 50%, rgba(29, 234, 197, 0.03) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(29, 234, 197, 0.02) 0%, transparent 50%);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 0;
            margin: 0;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 24px;
            width: 100%;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 56px;
            padding-bottom: 40px;
            border-bottom: 1px solid var(--border-color);
            position: relative;
        }

        .header::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 2px;
            background: var(--gradient-primary);
            border-radius: 2px;
        }

        .header-title {
            font-size: 48px;
            font-weight: 700;
            letter-spacing: -0.03em;
            margin-bottom: 12px;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.1;
        }

        .header-subtitle {
            font-size: 16px;
            color: var(--text-secondary);
            font-weight: 400;
            margin-bottom: 24px;
        }

        .header-nav {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 24px;
            flex-wrap: wrap;
        }

        .nav-link {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            padding: 8px 16px;
            border-radius: 8px;
            transition: all 0.2s ease;
            position: relative;
        }

        .nav-link:hover {
            color: var(--accent-primary);
            background: rgba(29, 234, 197, 0.1);
        }

        .nav-link::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 2px;
            background: var(--gradient-primary);
            transition: width 0.3s ease;
        }

        .nav-link:hover::after {
            width: calc(100% - 32px);
        }

        .nav-separator {
            color: var(--text-tertiary);
            font-size: 12px;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 24px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 24px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            min-width: 0;
            display: flex;
            flex-direction: column;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--gradient-primary);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-4px);
            border-color: var(--accent-primary);
            box-shadow: var(--shadow-lg), var(--shadow-glow);
            background: var(--bg-card-hover);
        }

        .stat-card:hover::before {
            opacity: 1;
        }

        .stat-label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            opacity: 0.8;
        }

        .stat-value {
            font-family: 'JetBrains Mono', 'Consolas', monospace;
            font-size: 28px;
            font-weight: 600;
            color: var(--text-primary);
            line-height: 1.2;
            word-break: break-word;
            overflow-wrap: break-word;
            hyphens: auto;
            min-width: 0;
            max-width: 100%;
        }

        /* Responsive font sizing for very large numbers */
        .stat-value.large-number {
            font-size: clamp(18px, 2.5vw, 24px);
        }

        .stat-value.extra-large-number {
            font-size: clamp(16px, 2vw, 20px);
            line-height: 1.3;
        }

        .stat-status {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .stat-status.synced {
            background: rgba(16, 185, 129, 0.15);
            color: var(--success);
        }

        .stat-status.syncing {
            background: rgba(245, 158, 11, 0.15);
            color: var(--warning);
        }

        .stat-status-indicator {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
        }

        .stat-status.synced .stat-status-indicator {
            background: var(--success);
        }

        .stat-status.syncing .stat-status-indicator {
            background: var(--warning);
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Collections Section */
        .collections-section {
            margin-top: 48px;
            padding-top: 32px;
            border-top: 1px solid var(--border-color);
        }

        .collections-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 20px;
            text-align: center;
        }

        .collections-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            align-items: center;
        }

        .collection-badge {
            display: inline-flex;
            align-items: center;
            padding: 10px 18px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: default;
        }

        .collection-badge:hover {
            border-color: var(--accent-primary);
            background: var(--bg-card-hover);
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
            color: var(--accent-primary);
        }

        .collection-loading {
            color: var(--text-tertiary);
            font-style: italic;
        }

        /* Network Badge */
        .network-badge {
            display: inline-flex;
            align-items: center;
            padding: 6px 12px;
            background: rgba(29, 234, 197, 0.1);
            border: 1px solid var(--accent-primary);
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            color: var(--accent-primary);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        /* Loading States */
        .loading {
            color: var(--text-tertiary);
            font-style: italic;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .content {
                padding: 24px 16px;
            }

            .header-title {
                font-size: 32px;
            }

            .header-subtitle {
                font-size: 14px;
            }

            .header-nav {
                gap: 16px;
            }

            .nav-link {
                font-size: 13px;
                padding: 6px 12px;
            }

            .stats-grid {
                grid-template-columns: 1fr;
                gap: 16px;
            }

            .stat-card {
                padding: 20px;
            }

            .stat-value {
                font-size: 24px;
            }

            .stat-value.large-number {
                font-size: 20px;
            }

            .stat-value.extra-large-number {
                font-size: 18px;
            }

            .collections-grid {
                gap: 8px;
            }

            .collection-badge {
                font-size: 13px;
                padding: 8px 14px;
            }
        }

        @media (max-width: 480px) {
            .header-title {
                font-size: 28px;
            }

            .header-nav {
                flex-direction: column;
                gap: 12px;
            }

            .nav-separator {
                display: none;
            }
        }

        /* Hide testnet elements */
        .testnet-10 > .hide-testnet,
        .testnet-11 > .hide-testnet {
            display: none;
        }
    </style>
</head>
<body>
    <div class="content">
        <div class="header">
            <h1 class="header-title">KRC-721 Indexer</h1>
            <p class="header-subtitle">Kaspa NFT Protocol • v{{version}}</p>
            <nav class="header-nav">
                <span class="network-badge">{{network}}</span>
                <span class="nav-separator">•</span>
                <a href="https://kaspa.com/nft/collections/NACHO" target="_blank" class="nav-link hide-testnet">Marketplace</a>
                <span class="nav-separator hide-testnet">•</span>
                <a href="https://nft.katbridge.com" target="_blank" class="nav-link hide-testnet">Bridge NFTs</a>
                <span class="nav-separator hide-testnet">•</span>
                <a href="/sandbox" class="nav-link">Sandbox</a>
                <span class="nav-separator">•</span>
                <a href="/docs" target="_blank" class="nav-link">Documentation</a>
            </nav>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Network</div>
                <div class="stat-value" id="network">...</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Indexer Status</div>
                <div class="stat-value" id="sync-status">...</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">DAA Score</div>
                <div class="stat-value" id="daa-score">...</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Operation Score</div>
                <div class="stat-value" id="op-score">...</div>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Collections</div>
                <div class="stat-value" id="deployments">...</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Mints</div>
                <div class="stat-value" id="mints">...</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Transfers</div>
                <div class="stat-value" id="transfers">...</div>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">PoW Fees</div>
                <div class="stat-value" id="pow-fees">...</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Royalties</div>
                <div class="stat-value" id="royalties">...</div>
            </div>
        </div>

        <div class="collections-section">
            <h2 class="collections-title">Latest Collections</h2>
            <div class="collections-grid" id="collections-container">
                <span class="collection-loading">Loading...</span>
            </div>
        </div>
    </div>

    <script>
        async function fetchJson(url) {
            try {
                const response = await fetch(url);
                if (!response.ok) {
                    return null;
                }
                const data = await response.json();
                return data.result;
            } catch (error) {
                console.error('Fetch error:', error);
                return null;
            }
        }

        function toKAS(sompi) {
            const num = (sompi / 1e8).toFixed(2);
            return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",") + 
                   ("{{network}}" == "mainnet" ? " KAS" : " TKAS");
        }

        function toCS(num) {
            return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
        }

        function updateSyncStatus(element, isSynced) {
            if (isSynced) {
                element.innerHTML = '<span class="stat-status synced"><span class="stat-status-indicator"></span>Synced</span>';
            } else {
                element.innerHTML = '<span class="stat-status syncing"><span class="stat-status-indicator"></span>Syncing</span>';
            }
        }

        async function updateStats() {
            const status = await fetchJson("/api/v1/krc721/{{network}}/status");
            
            if (!status) {
                return;
            }

            const {
                network,
                isNodeConnected,
                isNodeSynced,
                isIndexerSynced,
                daaScore,
                powFeesTotal,
                royaltyFeesTotal,
                tokenDeploymentsTotal,
                tokenMintsTotal,
                tokenTransfersTotal,
                currentOpScore,
            } = status;

            const isSynced = isNodeConnected && isNodeSynced && isIndexerSynced;

            // Update values with responsive font sizing for large numbers
            const networkEl = document.getElementById('network');
            networkEl.textContent = network.toUpperCase();
            
            updateSyncStatus(document.getElementById('sync-status'), isSynced);
            
            const daaScoreEl = document.getElementById('daa-score');
            daaScoreEl.textContent = toCS(daaScore);
            
            const opScoreEl = document.getElementById('op-score');
            const opScoreText = toCS(currentOpScore);
            opScoreEl.textContent = opScoreText;
            // Apply responsive sizing for very large operation scores
            if (currentOpScore > 1000000000000) {
                opScoreEl.classList.add('extra-large-number');
            } else if (currentOpScore > 1000000000) {
                opScoreEl.classList.add('large-number');
            }
            
            document.getElementById('deployments').textContent = toCS(tokenDeploymentsTotal);
            document.getElementById('mints').textContent = toCS(tokenMintsTotal);
            document.getElementById('transfers').textContent = toCS(tokenTransfersTotal);
            document.getElementById('pow-fees').textContent = toKAS(powFeesTotal);
            document.getElementById('royalties').textContent = toKAS(royaltyFeesTotal);
        }

        async function updateLatest() {
            const latest = await fetchJson("/api/v1/krc721/{{network}}/deployments?direction=back&limit=5");
            const container = document.getElementById('collections-container');
            
            if (!latest || latest.length === 0) {
                container.innerHTML = '<span class="collection-loading">No collections yet</span>';
                return;
            }

            const badges = latest.map(deployment => {
                return `<span class="collection-badge">${deployment.tick}</span>`;
            }).join('');

            container.innerHTML = badges + '<span class="collection-loading">...</span>';
        }

        async function update() {
            await Promise.all([updateStats(), updateLatest()]);
        }

        document.addEventListener('DOMContentLoaded', async () => {
            try {
                await update();
                setInterval(update, 60000); // Update every minute
            } catch (error) {
                console.error('Update error:', error);
            }
        });
    </script>
</body>
</html>
