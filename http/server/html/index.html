<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaspa KRC-721 indexer</title>
    <style>

        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Mono:wght@100..900&family=Roboto:ital,wght@0,100..900;1,100..900&family=Ubuntu+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap');

        * {
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", "Roboto", Helvetica, Arial, sans-serif;
            font-size: 14px;
            background-color: #000000;
            color: #ffffff;
            padding: 32px;
            min-height: 100vh;
            margin: 0;
            box-sizing: border-box;
            line-height: 1.5;
            position: relative;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .bullet {
            font-size: 14px;
            margin-top: 2px;
        }

        .content {
            max-width: 1280px;
            margin: 0 auto;
            width: 100%;
            height: auto;
            overflow-y: visible;
        }

        .header {
            display: flex;
            flex-direction: column;
            flex-wrap: wrap;
            justify-content: center;
            text-align: center;
            margin-bottom: 16px;
            font-size: 20px;
        }

        .header .line {
            display: flex;
            flex-direction: row;
            justify-content: center;
        }

        .header .line > div {
            padding: 8px;
            white-space: nowrap;
        }

        .latest {
            display: flex;
            flex-direction: column;
            flex-wrap: wrap;
            justify-content: center;
            text-align: center;
            margin-top: 16px;
        }

        .latest > .label {
            font-size: 18px;
            padding: 16px;
            justify-content: center;
            color: #bcbcbc;
        }

        .latest .collections {
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            justify-content: center;
        }

        .latest .collections > .deployment {
            font-size: 14px;
            padding: 16px;
            margin: 16px;
        }

        .stats {
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            justify-content: center;
        }

        .metric > .label {
            color: #bcbcbc;
        }

        .metric > .value {
            color: #ffffff;
            font-weight: bold;
            font-size: 18px;
        }
        
        .metric {
            font-family: Noto Sans Mono, Ubuntu, Consolas, Monaco, monospace;
            font-size: 14px;
            /* border: 1px solid #ccc; */
            border-radius: 8px;
            padding: 16px;
            margin: 16px;
        }

        a {
            color: rgb(29, 234, 197);
            text-decoration: none;
        }
        a:hover {
            color: rgb(46, 148, 129);
        }

        /* Mobile Responsive Design */
        @media screen and (max-width: 600px) {
            body {
                padding: 8px;
                font-size: 16px;
                min-height: 100%;
                width: 100%;
                position: relative;
                overflow-y: auto;
                height: auto;
            }

            .bullet {
                display: none;
            }

            nx {
                display: none;
            }

            .content {
                width: 100%;
                padding: 0;
                margin: 0;
            }

            .header {
                flex-direction: column;
                text-align: center;
            }

            .header .line {
                font-size: 20px;
                padding: 12px 4px;
                flex-direction: column;
            }

            .stats {
                flex-direction: column;
                align-items: stretch;
                margin: 0;
                width: 100%;
            }

            .metric {
                width: auto;
                font-size: 16px;
                margin: 8px 4px;
                padding: 16px 8px;
                text-align: center;
                display: flex;
                flex-direction: column;
            }

            .metric > .label {
                display: block;
                margin-bottom: 12px;
            }

            .metric > .value {
                font-size: 22px;
            }

            .latest {
                margin: 16px 4px;
                width: auto;
            }

            .latest > .label {
                font-size: 20px;
                padding: 12px 4px;
                margin-bottom: 8px;
            }

            .latest .collections {
                flex-direction: column;
                /* align-items: stretch; */
                width: 100%;
                font-size: 22px;
            }

            .latest .collections > .deployment {
                font-size: 16px;
                margin: 4px;
                padding: 12px 4px;
                text-align: center;
            }
        }

        .testnet-10 > .hide-testnet, 
        .testnet-11 > .hide-testnet {
            display: none;
        }

    </style>
</head>
<body>
    <div class="content">
        <div class="header">
            <div class="line"><div>KRC-721</div> <div>Indexer v{{version}}</div></div>
            <div class="line {{network}}">
                <div class="hide-testnet"><a href="https://krcscan.io" target="_blank">Explorer</a></div>
                <div class="bullet hide-testnet"> ◼ </div>
                <div><a href="/sandbox">Sandbox</a></div>
                <div class="bullet"> ◼ </div>
                <div><a href="/docs" target="_blank">Documentation</a></div>
            </div>
        </div>
        <div class="stats {{network}}">
            <div id="network" class="metric">
                <span class="label">Network<nx>:</nx></span>
                <span class="value">...</span>
            </div>
            <div id="sync-status" class="metric">
                <span class="label">Indexer Status<nx>:</nx></span>
                <span class="value">...</span>
            </div>
            <div id="daa-score" class="metric">
                <span class="label">DAA Score<nx>:</nx></span>
                <span class="value">...</span>
            </div>
            <div id="op-score" class="metric">
                <span class="label">Op Score<nx>:</nx></span>
                <span class="value">...</span>
            </div>
        </div>
        <div class="stats {{network}}">
            <div id="deployments" class="metric">
                <span class="label">Collections<nx>:</nx></span>
                <span class="value">...</span>
            </div>
            <div id="mints" class="metric">
                <span class="label">Mints<nx>:</nx></span>
                <span class="value">...</span>
            </div>
            <div id="transfers" class="metric">
                <span class="label">Transfers<nx>:</nx></span>
                <span class="value">...</span>
            </div>
        </div>
        <div class="stats {{network}}">
            <div id="pow-fees" class="metric">
                <span class="label">PoW Fees<nx>:</nx></span>
                <span class="value">...</span>
            </div>
            <div id="royalties" class="metric">
                <span class="label">Royalties<nx>:</nx></span>
                <span class="value">...</span>
            </div>
        </div>

        <div class="latest {{network}}">
            <span class="label">Latest Collections</span>
            <div class="collections"></div>
        </div>
    </div>

    <script>

        async function fetchJson(url) {
            try {
                const response = await fetch(url);
                if (!response.ok) {  // response.ok is true if status code is 200-299
                    responseArea.innerHTML = `<span style='color: #884444;'>Error: ${response.status} - ${response.statusText}</span>`;
                    return;
                }
                const data = await response.json();
                return data.result;
            } catch (error) {
                // responseArea.textContent = `Error: ${error.message}`;
            }
        }

        function toKAS(sompi) {
            const num = (sompi / 1e8).toFixed(2);
            let value = num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
            if ("{{network}}" == "mainnet") {
                return `${value} KAS`;
            } else {
                return `${value} TKAS`;
            }
        }

        function toCS(num) {
            return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
        }

        async function updateStats() {
            let status = await fetchJson("/api/v1/krc721/{{network}}/status");
            
            if (status == null) {
                return;
            }

            let {
                network,
                isNodeConnected,
                isNodeSynced,
                isIndexerSynced,
                lastKnownBlockHash,
                daaScore,
                powFeesTotal,
                royaltyFeesTotal,
                tokenDeploymentsTotal,
                tokenMintsTotal,
                tokenTransfersTotal,
                blueScore,
                currentOpScore,
            } = status;

            let syncStatus = (isNodeConnected && isNodeSynced && isIndexerSynced) ? "Synced" : "Syncing...";

            let stats = {
                "network": network.toUpperCase(),
                "sync-status": syncStatus,
                "daa-score": toCS(daaScore),
                "deployments": toCS(tokenDeploymentsTotal),
                "mints": toCS(tokenMintsTotal),
                "transfers": toCS(tokenTransfersTotal),
                "pow-fees": toKAS(powFeesTotal),
                "royalties": toKAS(royaltyFeesTotal),
                "op-score": toCS(currentOpScore),
            }

            for (let [key, value] of Object.entries(stats)) {
                document.querySelector(`#${key} > .value`).innerHTML = value;
            }
        }

        async function updateLatest() {
            let latest = await fetchJson("/api/v1/krc721/{{network}}/deployments?direction=back&limit=5");
            
            if (latest == null) {
                return;
            }

            // let latest = await fetchJson("/api/v1/krc721/{{network}}/deployments?limit=5");
            let deployments = latest.map(deployment => {
                return `<div class="deployment">${deployment.tick}</div>`;
            });
            document.querySelector(".latest .collections").innerHTML = deployments.join("&nbsp;")+`<div class="deployment">...</div>`;
        }

        async function update() {
            await updateStats();
            await updateLatest();
        }

        document.addEventListener('DOMContentLoaded', async () => {
            try {
                await update();
                setInterval(update, 1000 * 60);
            } catch (error) {
                console.error(error);
            }
        });
    </script>
</body>
</html>
