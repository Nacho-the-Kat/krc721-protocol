<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Sandbox - KRC-721 Indexer</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap');

        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #111118;
            --bg-card: #151520;
            --bg-card-hover: #1a1a28;
            --border-color: #252535;
            --text-primary: #ffffff;
            --text-secondary: #a0a0b0;
            --text-tertiary: #6b6b7f;
            --accent-primary: #1deac5;
            --accent-secondary: #12b89a;
            --accent-glow: rgba(29, 234, 197, 0.15);
            --success: #10b981;
            --error: #ef4444;
            --gradient-primary: linear-gradient(135deg, #1deac5 0%, #12b89a 100%);
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.3);
            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.4);
            --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.5);
            --shadow-glow: 0 0 24px rgba(29, 234, 197, 0.2);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            font-size: 15px;
            line-height: 1.6;
            background: var(--bg-primary);
            background-image: 
                radial-gradient(circle at 20% 50%, rgba(29, 234, 197, 0.03) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(29, 234, 197, 0.02) 0%, transparent 50%);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 0;
            margin: 0;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 24px;
            width: 100%;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 48px;
            padding-bottom: 32px;
            border-bottom: 1px solid var(--border-color);
            position: relative;
        }

        .header::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 2px;
            background: var(--gradient-primary);
            border-radius: 2px;
        }

        .header-title {
            font-size: 42px;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 12px;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.1;
        }

        .header-nav {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-top: 16px;
        }

        .nav-link {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            padding: 6px 12px;
            border-radius: 6px;
            transition: all 0.2s ease;
        }

        .nav-link:hover {
            color: var(--accent-primary);
            background: rgba(29, 234, 197, 0.1);
        }

        /* Endpoint Section */
        .endpoint-section {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            margin-bottom: 16px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
        }

        .endpoint-section:hover {
            border-color: var(--accent-primary);
            box-shadow: var(--shadow-md);
        }

        .endpoint-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 24px;
            cursor: pointer;
            user-select: none;
        }

        .endpoint-header-left {
            display: flex;
            flex-direction: column;
            gap: 4px;
            min-width: 0;
        }

        .endpoint-title {
            font-family: 'JetBrains Mono', monospace;
            font-size: 15px;
            font-weight: 600;
            color: var(--accent-primary);
            word-break: break-all;
        }

        .endpoint-description {
            font-size: 13px;
            color: var(--text-tertiary);
        }

        .endpoint-toggle {
            font-size: 18px;
            color: var(--text-tertiary);
            transition: transform 0.2s ease;
            flex-shrink: 0;
            margin-left: 16px;
        }

        .endpoint-section.open .endpoint-toggle {
            transform: rotate(180deg);
        }

        .endpoint-body {
            display: none;
            padding: 0 24px 24px;
        }

        .endpoint-section.open .endpoint-body {
            display: block;
        }

        .endpoint-controls {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 16px;
            align-items: center;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            min-width: 180px;
        }

        .input-label {
            font-size: 12px;
            font-weight: 500;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        input[type="text"],
        select {
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            padding: 10px 14px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            transition: all 0.2s ease;
            width: 100%;
        }

        input[type="text"]:focus,
        select:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        input[type="text"]::placeholder {
            color: var(--text-tertiary);
        }

        .example-select {
            min-width: 240px;
        }

        button {
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 600;
            padding: 10px 24px;
            background: var(--gradient-primary);
            color: #000;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        button:hover {
            transform: translateY(-1px);
            box-shadow: var(--shadow-md);
        }

        button:active {
            transform: translateY(0);
        }

        .next-page-btn, .copy-url-btn {
            background: var(--bg-secondary);
            color: var(--accent-primary);
            border: 1px solid var(--accent-primary);
        }

        .next-page-btn:hover, .copy-url-btn:hover {
            background: rgba(29, 234, 197, 0.1);
        }

        .next-page-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .copy-url-btn {
            padding: 10px 16px;
            font-size: 13px;
        }

        .url-preview-row {
            display: flex;
            gap: 8px;
            align-items: stretch;
            margin-bottom: 16px;
        }

        .url-preview {
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            color: var(--text-secondary);
            background: var(--bg-secondary);
            padding: 12px;
            border-radius: 8px;
            word-break: break-all;
            border: 1px solid var(--border-color);
            flex: 1;
        }

        .json-response {
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            line-height: 1.6;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 16px;
            max-height: 500px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
            margin-top: 16px;
            display: none;
        }

        .json-response.show {
            display: block;
        }

        .response-meta {
            font-size: 12px;
            color: var(--text-tertiary);
            margin-top: 8px;
        }

        .pagination-info {
            margin-top: 16px;
            padding: 12px 16px;
            background: rgba(29, 234, 197, 0.1);
            border: 1px solid var(--accent-primary);
            border-radius: 8px;
            font-size: 13px;
            display: none;
        }

        .pagination-info.show {
            display: block;
        }

        .pagination-info code {
            font-family: 'JetBrains Mono', monospace;
            background: var(--bg-card);
            padding: 2px 6px;
            border-radius: 4px;
            color: var(--accent-primary);
        }

        /* JSON Syntax Highlighting */
        .json-response .number { color: var(--success); }
        .json-response .key { color: var(--accent-primary); }
        .json-response .string { color: #fbbf24; }
        .json-response .boolean { color: #f472b6; }
        .json-response .null { color: var(--text-tertiary); }

        .error-message {
            color: var(--error);
            font-weight: 500;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .content { padding: 24px 16px; }
            .header-title { font-size: 32px; }
            .endpoint-controls { flex-direction: column; align-items: stretch; }
            .input-group { min-width: 100%; }
            button { width: 100%; }
            .url-preview-row { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="content">
        <div class="header">
            <h1 class="header-title">API Sandbox</h1>
            <nav class="header-nav">
                <a href="/" class="nav-link">Home</a>
                <span style="color: var(--text-tertiary);">&bull;</span>
                <a href="/docs" target="_blank" class="nav-link">Documentation</a>
            </nav>
        </div>

        <div id="endpoints-container"></div>
    </div>

    <script>
        const endpoints = [
            "/api/v1/krc721/{{network}}/status",
            "/api/v1/krc721/{{network}}/nfts",
            "/api/v1/krc721/{{network}}/nfts/:tick",
            "/api/v1/krc721/{{network}}/nfts/:tick/:id",
            "/api/v1/krc721/{{network}}/owners/:tick",
            "/api/v1/krc721/{{network}}/address/:address",
            "/api/v1/krc721/{{network}}/address/:address/:tick",
            "/api/v1/krc721/{{network}}/royalties/:address/:tick",
            "/api/v1/krc721/{{network}}/deployments",
            "/api/v1/krc721/{{network}}/ops",
            "/api/v1/krc721/{{network}}/ops/score/:score",
            "/api/v1/krc721/{{network}}/ops/txid/:txid",
            "/api/v1/krc721/{{network}}/rejections/txid/:txid",
            "/api/v1/krc721/{{network}}/reserved",
            "/api/v1/krc721/{{network}}/history/:tick/:id",
            "/api/v1/krc721/{{network}}/ranges/:tick",
        ];

        const paginatedEndpoints = ["nfts", "owners/:tick", ":address", "address/:address/:tick", "ops", "deployments", "history/:tick/:id"];

        const endpointDescriptions = {
            '/status': 'Indexer health, sync status, network statistics, and cumulative fee totals',
            '/nfts': 'All deployed NFT collections, paginated by operation score',
            '/nfts/:tick': 'Full details for a single collection',
            '/nfts/:tick/:id': 'Token details including current owner',
            '/owners/:tick': 'All token owners in a collection, paginated by token ID',
            '/address/:address': 'All NFTs owned by an address across all collections, paginated by tick-tokenId',
            '/address/:address/:tick': 'NFTs owned by an address in a specific collection, paginated by token ID',
            '/royalties/:address/:tick': 'Royalty fee (in SOMPI) that an address must pay to mint from a collection',
            '/deployments': 'All deployment operations, paginated by operation score',
            '/ops': 'All operations (deploy, mint, transfer, discount), paginated by operation score',
            '/ops/score/:score': 'Single operation looked up by its unique operation score',
            '/ops/txid/:txid': 'Single operation looked up by transaction ID',
            '/rejections/txid/:txid': 'Rejection reason for a failed operation, looked up by transaction ID',
            '/reserved': 'List of reserved ticker names that cannot be deployed',
            '/history/:tick/:id': 'Ownership history of a specific token, paginated by operation score',
            '/ranges/:tick': 'Available token ID ranges for minting (empty string when fully minted)',
        };

        const paramPlaceholders = {
            tick: 'e.g. NACHO',
            address: 'e.g. kaspa:qplfvwnt6...',
            id: 'e.g. 1',
            txid: 'e.g. 145e07ae3278f3d6...',
            score: 'e.g. 24907687056003',
        };

        function getEndpointSuffix(url) {
            const base = '/api/v1/krc721/{{network}}/';
            const idx = url.indexOf(base);
            return idx >= 0 ? url.substring(idx + base.length) : url;
        }

        function getDescription(url) {
            const suffix = getEndpointSuffix(url);
            return endpointDescriptions['/' + suffix] || '';
        }

        function getOffsetType(url) {
            if (url.includes('/address/') && !url.includes('/address/:address/:tick')) {
                return 'ticktoken';
            } else if (url.includes('/owners/') || url.includes('/address/:address/:tick')) {
                return 'tokenid';
            } else {
                return 'score';
            }
        }

        function buildExampleOptions(offsetType) {
            let html = '<option value="">Select example...</option>';
            html += '<option value="limit=10">First 10 items</option>';
            html += '<option value="limit=10&direction=backward">Latest 10 items</option>';

            if (offsetType === 'score') {
                html += '<option value="offset=24907847264002&limit=10">Page from score 24907847264002</option>';
            } else if (offsetType === 'tokenid') {
                html += '<option value="offset=51&limit=10">Page from token #51</option>';
            } else if (offsetType === 'ticktoken') {
                html += '<option value="offset=NACHO-10&limit=10">Page from NACHO-10</option>';
            }
            return html;
        }

        function createEndpointSection(url) {
            const isPaginated = paginatedEndpoints.some(suffix => url.endsWith(suffix));
            const section = document.createElement('div');
            section.className = 'endpoint-section';

            const params = url.match(/:[a-zA-Z]+/g) || [];
            const previewId = `preview-${Math.random().toString(36).substring(2, 11)}`;

            // Collapsible header
            const header = document.createElement('div');
            header.className = 'endpoint-header';
            header.onclick = () => section.classList.toggle('open');

            const headerLeft = document.createElement('div');
            headerLeft.className = 'endpoint-header-left';

            const title = document.createElement('div');
            title.className = 'endpoint-title';
            title.textContent = url;
            headerLeft.appendChild(title);

            const desc = getDescription(url);
            if (desc) {
                const descEl = document.createElement('div');
                descEl.className = 'endpoint-description';
                descEl.textContent = desc;
                headerLeft.appendChild(descEl);
            }

            header.appendChild(headerLeft);
            const toggle = document.createElement('span');
            toggle.className = 'endpoint-toggle';
            toggle.textContent = '\u25BC';
            header.appendChild(toggle);
            section.appendChild(header);

            // Collapsible body
            const body = document.createElement('div');
            body.className = 'endpoint-body';

            // Controls container
            const controls = document.createElement('div');
            controls.className = 'endpoint-controls';

            // Path parameters
            params.forEach((param, index) => {
                const paramName = param.substring(1);
                const group = document.createElement('div');
                group.className = 'input-group';
                const label = document.createElement('label');
                label.className = 'input-label';
                label.textContent = paramName;
                const input = document.createElement('input');
                input.type = 'text';
                input.placeholder = paramPlaceholders[paramName] || `Enter ${paramName}`;
                input.id = `${previewId}-input-${index}`;
                input.oninput = () => updatePreview(previewId, url, body);
                input.onkeypress = (e) => { if (e.key === 'Enter') fetchJson(previewId); };
                group.appendChild(label);
                group.appendChild(input);
                controls.appendChild(group);
            });

            // Pagination controls
            if (isPaginated) {
                const offsetType = getOffsetType(url);

                const exampleGroup = document.createElement('div');
                exampleGroup.className = 'input-group';
                const exampleLabel = document.createElement('label');
                exampleLabel.className = 'input-label';
                exampleLabel.textContent = 'Example';
                const exampleSelect = document.createElement('select');
                exampleSelect.className = 'example-select';
                exampleSelect.id = `${previewId}-examples`;
                exampleSelect.innerHTML = buildExampleOptions(offsetType);
                exampleSelect.onchange = () => applyExample(previewId, exampleSelect.value, url, body);
                exampleGroup.appendChild(exampleLabel);
                exampleGroup.appendChild(exampleSelect);
                controls.appendChild(exampleGroup);

                const offsetGroup = document.createElement('div');
                offsetGroup.className = 'input-group';
                const offsetLabel = document.createElement('label');
                offsetLabel.className = 'input-label';
                offsetLabel.textContent = `Offset (${offsetType})`;
                const offsetInput = document.createElement('input');
                offsetInput.type = 'text';
                offsetInput.placeholder = 'Optional';
                offsetInput.id = `${previewId}-offset`;
                offsetInput.oninput = () => updatePreview(previewId, url, body);
                offsetInput.onkeypress = (e) => { if (e.key === 'Enter') fetchJson(previewId); };
                offsetGroup.appendChild(offsetLabel);
                offsetGroup.appendChild(offsetInput);
                controls.appendChild(offsetGroup);

                const limitGroup = document.createElement('div');
                limitGroup.className = 'input-group';
                const limitLabel = document.createElement('label');
                limitLabel.className = 'input-label';
                limitLabel.textContent = 'Limit';
                const limitInput = document.createElement('input');
                limitInput.type = 'text';
                limitInput.placeholder = '50';
                limitInput.value = '50';
                limitInput.id = `${previewId}-limit`;
                limitInput.oninput = () => updatePreview(previewId, url, body);
                limitInput.onkeypress = (e) => { if (e.key === 'Enter') fetchJson(previewId); };
                limitGroup.appendChild(limitLabel);
                limitGroup.appendChild(limitInput);
                controls.appendChild(limitGroup);

                const directionGroup = document.createElement('div');
                directionGroup.className = 'input-group';
                const directionLabel = document.createElement('label');
                directionLabel.className = 'input-label';
                directionLabel.textContent = 'Direction';
                const directionInput = document.createElement('input');
                directionInput.type = 'text';
                directionInput.placeholder = 'forward/backward';
                directionInput.id = `${previewId}-direction`;
                directionInput.oninput = () => updatePreview(previewId, url, body);
                directionInput.onkeypress = (e) => { if (e.key === 'Enter') fetchJson(previewId); };
                directionGroup.appendChild(directionLabel);
                directionGroup.appendChild(directionInput);
                controls.appendChild(directionGroup);
            }

            body.appendChild(controls);

            // URL preview row (preview + copy button)
            const previewRow = document.createElement('div');
            previewRow.className = 'url-preview-row';

            const preview = document.createElement('div');
            preview.id = previewId;
            preview.className = 'url-preview';
            preview.textContent = url;

            previewRow.appendChild(preview);

            const copyBtn = document.createElement('button');
            copyBtn.className = 'copy-url-btn';
            copyBtn.textContent = 'Copy';
            copyBtn.onclick = (e) => {
                e.stopPropagation();
                navigator.clipboard.writeText(preview.textContent).then(() => {
                    copyBtn.textContent = 'Copied!';
                    setTimeout(() => { copyBtn.textContent = 'Copy'; }, 1500);
                });
            };
            previewRow.appendChild(copyBtn);

            if (params.length === 0 && !isPaginated) {
                previewRow.style.display = 'none';
            }
            body.appendChild(previewRow);

            // Action buttons
            const buttonContainer = document.createElement('div');
            buttonContainer.style.display = 'flex';
            buttonContainer.style.gap = '12px';

            const goButton = document.createElement('button');
            goButton.textContent = 'Fetch';
            goButton.onclick = () => fetchJson(previewId);
            buttonContainer.appendChild(goButton);

            if (isPaginated) {
                const nextButton = document.createElement('button');
                nextButton.textContent = 'Next Page';
                nextButton.className = 'next-page-btn';
                nextButton.id = `${previewId}-next-btn`;
                nextButton.style.display = 'none';
                nextButton.onclick = () => fetchNextPage(previewId, url, body);
                buttonContainer.appendChild(nextButton);
            }

            body.appendChild(buttonContainer);

            // Response area
            const responseArea = document.createElement('div');
            responseArea.id = `${previewId}-response`;
            responseArea.className = 'json-response';
            body.appendChild(responseArea);

            // Response meta (timing)
            const responseMeta = document.createElement('div');
            responseMeta.id = `${previewId}-meta`;
            responseMeta.className = 'response-meta';
            body.appendChild(responseMeta);

            // Pagination info
            if (isPaginated) {
                const paginationInfo = document.createElement('div');
                paginationInfo.id = `${previewId}-pagination-info`;
                paginationInfo.className = 'pagination-info';
                body.appendChild(paginationInfo);
            }

            section.appendChild(body);

            // Initialize URL preview with default pagination values
            if (isPaginated) {
                updatePreview(previewId, url, body);
            }

            return section;
        }

        function updatePreview(previewId, template, container) {
            const preview = document.getElementById(previewId);
            if (!preview) return;
            
            let url = template;
            const inputs = Array.from(container.getElementsByTagName('input'));
            
            inputs.forEach(input => {
                if (input.id.includes('-offset') || input.id.includes('-limit') || input.id.includes('-direction')) {
                    return;
                }
                const label = input.previousElementSibling;
                if (label && label.className === 'input-label') {
                    const param = label.textContent.trim();
                    if (param) {
                        url = url.replace(`:${param}`, input.value || `:${param}`);
                    }
                }
            });
            
            const queryParams = [];
            const offsetInput = document.getElementById(`${previewId}-offset`);
            const limitInput = document.getElementById(`${previewId}-limit`);
            const directionInput = document.getElementById(`${previewId}-direction`);
            
            if (offsetInput && offsetInput.value.trim()) {
                queryParams.push(`offset=${encodeURIComponent(offsetInput.value.trim())}`);
            }
            if (limitInput && limitInput.value.trim()) {
                queryParams.push(`limit=${encodeURIComponent(limitInput.value.trim())}`);
            }
            if (directionInput && directionInput.value.trim()) {
                queryParams.push(`direction=${encodeURIComponent(directionInput.value.trim())}`);
            }
            
            if (queryParams.length > 0) {
                url = `${url}?${queryParams.join('&')}`;
            }
            
            preview.textContent = url;
        }

        function applyExample(previewId, example, template, container) {
            if (!example) {
                const offsetInput = document.getElementById(`${previewId}-offset`);
                const limitInput = document.getElementById(`${previewId}-limit`);
                const directionInput = document.getElementById(`${previewId}-direction`);
                if (offsetInput) offsetInput.value = '';
                if (limitInput) limitInput.value = '50';
                if (directionInput) directionInput.value = '';
                updatePreview(previewId, template, container);
                return;
            }
            
            const params = example.split('&');
            const exampleParams = {};
            params.forEach(param => {
                const [key, value] = param.split('=');
                if (key && value) {
                    exampleParams[key] = decodeURIComponent(value);
                }
            });
            
            const offsetInput = document.getElementById(`${previewId}-offset`);
            const limitInput = document.getElementById(`${previewId}-limit`);
            const directionInput = document.getElementById(`${previewId}-direction`);
            
            if (offsetInput) offsetInput.value = exampleParams.offset || '';
            if (limitInput) limitInput.value = exampleParams.limit || '50';
            if (directionInput) directionInput.value = exampleParams.direction || '';
            
            updatePreview(previewId, template, container);
        }

        async function fetchJson(previewId) {
            const preview = document.getElementById(previewId);
            const url = preview.textContent;
            const responseArea = document.getElementById(`${previewId}-response`);
            const responseMeta = document.getElementById(`${previewId}-meta`);
            const paginationInfo = document.getElementById(`${previewId}-pagination-info`);
            const nextPageBtn = document.getElementById(`${previewId}-next-btn`);

            responseArea.className = 'json-response show';
            responseArea.textContent = 'Loading...';
            if (responseMeta) responseMeta.textContent = '';
            if (paginationInfo) paginationInfo.className = 'pagination-info';
            if (nextPageBtn) nextPageBtn.style.display = 'none';

            if (url.replace(/kaspatest:|kaspa:/, '').includes(":")) {
                responseArea.innerHTML = '<span class="error-message">Please fill in all required parameters</span>';
                return;
            }

            const t0 = performance.now();

            try {
                const response = await fetch(url);
                const elapsed = Math.round(performance.now() - t0);
                const contentType = response.headers.get('content-type');
                
                if (!contentType || !contentType.includes('application/json')) {
                    const text = await response.text();
                    responseArea.innerHTML = `<span class="error-message">HTTP ${response.status}: ${text}</span>`;
                    if (responseMeta) responseMeta.textContent = `${elapsed}ms`;
                    return;
                }
                
                if (!response.ok) {
                    try {
                        const data = await response.json();
                        responseArea.innerHTML = `<span class="error-message">Error ${response.status}: ${data.message || response.statusText}</span>`;
                    } catch (e) {
                        responseArea.innerHTML = `<span class="error-message">Error ${response.status}: ${response.statusText}</span>`;
                    }
                    if (responseMeta) responseMeta.textContent = `${elapsed}ms`;
                    return;
                }
                
                const data = await response.json();
                responseArea.innerHTML = stringify(data);
                if (responseMeta) responseMeta.textContent = `${elapsed}ms`;
                
                if (paginationInfo) {
                    const resultCount = Array.isArray(data.result) ? data.result.length : (data.result ? 1 : 0);
                    if (data.next != null) {
                        let infoHtml = `<strong>Pagination:</strong> ${resultCount} items &bull; Next: <code>${data.next}</code>`;
                        if (nextPageBtn) {
                            nextPageBtn.style.display = 'inline-block';
                            nextPageBtn.dataset.nextOffset = data.next;
                        }
                        paginationInfo.innerHTML = infoHtml;
                        paginationInfo.className = 'pagination-info show';
                    } else {
                        paginationInfo.innerHTML = `<strong>Pagination:</strong> ${resultCount} items &bull; Last page`;
                        paginationInfo.className = 'pagination-info show';
                    }
                }
            } catch (error) {
                const elapsed = Math.round(performance.now() - t0);
                responseArea.innerHTML = `<span class="error-message">Error: ${error.message}</span>`;
                if (responseMeta) responseMeta.textContent = `${elapsed}ms`;
            }
        }

        function fetchNextPage(previewId, template, container) {
            const nextPageBtn = document.getElementById(`${previewId}-next-btn`);
            const offsetInput = document.getElementById(`${previewId}-offset`);
            
            if (nextPageBtn && nextPageBtn.dataset.nextOffset) {
                if (offsetInput) {
                    offsetInput.value = nextPageBtn.dataset.nextOffset;
                    updatePreview(previewId, template, container);
                }
                fetchJson(previewId);
            }
        }

        function stringify(json) {
            if (typeof json != 'string') {
                json = JSON.stringify(json, (k, v) => { return typeof v === "bigint" ? v.toString() + 'n' : v; }, 2);
            }
            json = json.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"(\d+)n"/g,"$1n");
            return json.replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?n?)/g, function (match) {
                var cls = 'number';
                if (/^"/.test(match)) {
                    if (/:$/.test(match)) {
                        cls = 'key';
                    } else {
                        cls = 'string';
                    }
                } else if (/true|false/.test(match)) {
                    cls = 'boolean';
                } else if (/null/.test(match)) {
                    cls = 'null';
                }
                return '<span class="' + cls + '">' + match + '</span>';
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('endpoints-container');
            endpoints.forEach(url => {
                container.appendChild(createEndpointSection(url));
            });
        });
    </script>
</body>
</html>
